function rectEdge(cx,cy,w,h,tx,ty){
  const dx=tx-cx,dy=ty-cy;
  if(!dx&&!dy)return{x:cx,y:cy};
  const sx=(w/2)/Math.abs(dx||1e-9),sy=(h/2)/Math.abs(dy||1e-9),s=Math.min(sx,sy);
  return{x:cx+dx*s,y:cy+dy*s};
}
function circleEdge(cx,cy,r,tx,ty){
  const dx=tx-cx,dy=ty-cy,d=Math.hypot(dx,dy)||1;
  return{x:cx+(dx/d)*r,y:cy+(dy/d)*r};
}

function useDrag(initX,initY,onCommit,zoomRef){
  const live=useRef({x:initX,y:initY});
  const [,redraw]=useState(0);
  useEffect(()=>{live.current={x:initX,y:initY};},[initX,initY]);
  const onMouseDown=useCallback((e)=>{
    if(e.button!==0)return;
    e.stopPropagation();
    const s0={x:e.clientX,y:e.clientY},c0={...live.current};
    const onMove=(ev)=>{
      const z=zoomRef.current;
      live.current={x:c0.x+(ev.clientX-s0.x)/z,y:c0.y+(ev.clientY-s0.y)/z};
      redraw(n=>n+1);
    };
    const onUp=()=>{
      onCommit(live.current.x,live.current.y);
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  },[onCommit,zoomRef]);
  return{x:live.current.x,y:live.current.y,onMouseDown};
}

function EditText({value,onChange,x,y,w,h,fs=12,fill="#fff",bold=false,center=false}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(value);
  useEffect(()=>{setDraft(value);},[value]);
  const commit=()=>{setEditing(false);if(draft!==value)onChange(draft);};
  // Always centre: cx = x + w/2, cy = y + h/2
  const cx=x+w/2, cy=y+h/2;
  if(editing)return(
    <foreignObject x={x} y={cy-fs*0.9} width={w} height={fs*1.8} style={{overflow:"visible"}}>
      <input autoFocus value={draft}
        onChange={e=>setDraft(e.target.value)} onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setEditing(false);setDraft(value);}}}
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}
        style={{width:"100%",background:"rgba(10,22,50,0.95)",border:"1px solid #d4a843",
          color:"#fff",fontFamily:"'Caveat',cursive",fontSize:fs,fontWeight:bold?"700":"400",
          textAlign:"center",borderRadius:3,padding:"0 4px",outline:"none",boxSizing:"border-box",
          lineHeight:"1.6"}}/>
    </foreignObject>
  );
  return(
    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fill={fill}
      style={{fontFamily:"'Caveat',cursive",fontSize:fs,fontWeight:bold?"700":"400",cursor:"text",userSelect:"none"}}
      onDoubleClick={e=>{e.stopPropagation();setEditing(true);}}
      onMouseDown={e=>e.stopPropagation()}>
      {value}
    </text>
  );
}

function IconPicker({x,y,onPick,onClose}){
  const cols=8,cellSize=28,rows=Math.ceil(ICON_LIST.length/cols);
  const pw=cols*cellSize+8,ph=rows*cellSize+8;
  return(
    <g onMouseDown={e=>e.stopPropagation()}>
      <rect x={-2000} y={-2000} width={9999} height={9999} fill="transparent" onClick={onClose}/>
      <rect x={x} y={y} width={pw} height={ph} rx={6} fill="rgba(10,22,50,0.97)" stroke="#d4a843" strokeWidth={1.5}/>
      {ICON_LIST.map((ic,i)=>{
        const col=i%cols,row=Math.floor(i/cols),ex=x+4+col*cellSize,ey=y+4+row*cellSize;
        return(
          <g key={ic.key} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onPick(ic.key);}}>
            <rect x={ex} y={ey} width={cellSize-2} height={cellSize-2} rx={3} fill="transparent"
              onMouseEnter={e=>e.currentTarget.setAttribute("fill","rgba(212,168,67,0.2)")}
              onMouseLeave={e=>e.currentTarget.setAttribute("fill","transparent")}/>
            <text x={ex+(cellSize-2)/2} y={ey+(cellSize-2)*0.72} textAnchor="middle"
              fontSize={15} style={{userSelect:"none",pointerEvents:"none"}}>{ic.e}</text>
          </g>
        );
      })}
    </g>
  );
}

function SkillBox({skill,type,mx,my,ox,oy,branchId,memberId,skillIdx,onCommitMove,onUpdate,zoomRef,T,printMode,showEmoji,showPills,skillLabel,hobbyLabel}){
  const [pickerOpen,setPickerOpen]=useState(false);
  const commit=useCallback((nx,ny)=>onCommitMove(branchId,memberId,skillIdx,nx-mx,ny-my),[mx,my,branchId,memberId,skillIdx,onCommitMove]);
  const {x:sx,y:sy,onMouseDown}=useDrag(mx+ox,my+oy,commit,zoomRef);
  const p1=rectEdge(mx,my,MW,MH,sx,sy),p2=rectEdge(sx,sy,SW,SH,mx,my);
  const isHobby=type==="hobby";
  const borderCol=isHobby?T.hobbyStroke:T.skillStroke;
  const fillCol=isHobby?T.hobbyFill:T.skillFill;
  const lineCol=isHobby?T.lineHobby:T.lineSkill;
  const labelCol=isHobby?T.textHobby:T.textSkill;
  const pillCol=isHobby?T.pillHobby:T.pillSkill;
  const pillText=isHobby?hobbyLabel:skillLabel;
  const pillTextCol=isHobby?T.textHobby:T.textSkill;
  return(
    <g>
      <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={lineCol} strokeWidth={1} strokeDasharray="3 2"/>
      <g onMouseDown={printMode?null:onMouseDown} style={{cursor:printMode?"default":"grab"}}>
        <rect x={sx-SW/2} y={sy-SH/2} width={SW} height={SH} rx={5} fill={fillCol} stroke={borderCol} strokeWidth={1.2}/>
        {showEmoji&&<text x={sx-SW/2+7} y={sy+5} fontSize={14} style={{cursor:printMode?"default":"pointer",userSelect:"none"}}
          onMouseDown={e=>e.stopPropagation()}
          onClick={printMode?null:e=>{e.stopPropagation();setPickerOpen(v=>!v);}}>
          {ICONS[skill.icon]||"•"}
        </text>}
        {showPills&&<rect x={sx+SW/2-34} y={sy-SH/2+1} width={33} height={11} rx={3} fill={pillCol}/>}
        {showPills&&<text x={sx+SW/2-17} y={sy-SH/2+6} textAnchor="middle" dominantBaseline="central"
          style={{fontFamily:"'Caveat',cursive",fontSize:8,fill:pillTextCol,userSelect:"none",pointerEvents:"none"}}>
          {pillText}
        </text>}
        <EditText value={skill.label} x={showEmoji?sx-SW/2+24:sx-SW/2+6} y={sy-SH/2}
          w={showEmoji?(showPills?SW-58:SW-30):(showPills?SW-40:SW-12)} h={SH} fs={11} fill={labelCol}
          onChange={v=>onUpdate(branchId,memberId,"skill",v,skillIdx)}/>
      </g>
      {pickerOpen&&!printMode&&(
        <IconPicker x={sx-4} y={sy-SH/2-240}
          onPick={key=>{onUpdate(branchId,memberId,"icon",key,skillIdx);setPickerOpen(false);}}
          onClose={()=>setPickerOpen(false)}/>
      )}
    </g>
  );
}

function MemberNode({member,bx,by,branchId,onCommitMove,onCommitSkillMove,onUpdate,onRemove,zoomRef,T,printMode,showEmoji,showPills,skillLabel,hobbyLabel}){
  const commit=useCallback((nx,ny)=>onCommitMove(branchId,member.id,nx-bx,ny-by),[bx,by,branchId,member.id,onCommitMove]);
  const {x:mx,y:my,onMouseDown}=useDrag(bx+member.ox,by+member.oy,commit,zoomRef);
  const p1=rectEdge(bx,by,BW,BH,mx,my),p2=rectEdge(mx,my,MW,MH,bx,by);
  const defaultOx=mx<CX?-(SW+MW)/2-14:(SW+MW)/2+14;
  return(
    <g>
      <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
        stroke={T.lineMember} strokeWidth={1.2} strokeOpacity={0.45} strokeDasharray="5 3"/>
      {member.skills.map((sk,si)=>(
        <SkillBox key={si} skill={sk} type={si%2===0?"skill":"hobby"}
          mx={mx} my={my}
          ox={sk.ox!==undefined?sk.ox:defaultOx}
          oy={sk.oy!==undefined?sk.oy:si*32-((member.skills.length-1)*32)/2}
          branchId={branchId} memberId={member.id} skillIdx={si}
          onCommitMove={onCommitSkillMove} onUpdate={onUpdate} zoomRef={zoomRef} T={T} printMode={printMode}
          showEmoji={showEmoji} showPills={showPills} skillLabel={skillLabel} hobbyLabel={hobbyLabel}/>
      ))}
      <g onMouseDown={printMode?null:onMouseDown} style={{cursor:printMode?"default":"grab"}}>
        <rect x={mx-MW/2} y={my-MH/2} width={MW} height={MH} rx={4}
          fill={T.memberFill} stroke={T.memberStroke} strokeWidth={1}/>
        <EditText value={member.name} x={mx-MW/2} y={my-MH/2} w={printMode?MW:MW-18} h={MH}
          fs={12} bold fill={T.textMember} onChange={v=>onUpdate(branchId,member.id,"name",v)}/>
        {!printMode&&(
          <text x={mx+MW/2-9} y={my+5} textAnchor="middle" fill="rgba(255,80,80,0.75)"
            fontSize={15} style={{cursor:"pointer"}}
            onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();onRemove(branchId,member.id);}}>×</text>
        )}
      </g>
    </g>
  );
}

const CIRCLE_CENTRES=[{cx:CX-72,cy:CY-52},{cx:CX+72,cy:CY-52},{cx:CX,cy:CY+62}];

function BranchNode({branch,initPos,onCommitBranchMove,onCommitMemberMove,onCommitSkillMove,
                     onUpdate,onUpdateBranchLabel,onAddMember,onRemoveMember,
                     collapsed,onToggleCollapse,zoomRef,T,printMode,showEmoji,showPills,skillLabel,hobbyLabel}){
  const commit=useCallback((nx,ny)=>onCommitBranchMove(branch.id,nx,ny),[branch.id,onCommitBranchMove]);
  const {x:bx,y:by,onMouseDown}=useDrag(initPos.x,initPos.y,commit,zoomRef);
  const closest=CIRCLE_CENTRES.reduce((best,c)=>{
    const d=Math.hypot(bx-c.cx,by-c.cy);
    return d<best.d?{...c,d}:best;
  },{...CIRCLE_CENTRES[0],d:Infinity});
  const p1=circleEdge(closest.cx,closest.cy,CR,bx,by);
  const p2=rectEdge(bx,by,BW,BH,closest.cx,closest.cy);
  const side=bx<CX?"left":"right";
  const lines=branch.label.split("\n");
  return(
    <g>
      <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
        stroke={T.lineMain} strokeWidth={2.6} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 3px ${T.shadow}0.35))`}}/>
      {!collapsed&&branch.members.map(m=>(
        <MemberNode key={m.id} member={m} bx={bx} by={by} branchId={branch.id}
          onCommitMove={onCommitMemberMove} onCommitSkillMove={onCommitSkillMove}
          onUpdate={onUpdate} onRemove={onRemoveMember} zoomRef={zoomRef} T={T} printMode={printMode}
          showEmoji={showEmoji} showPills={showPills} skillLabel={skillLabel} hobbyLabel={hobbyLabel}/>
      ))}
      <g onMouseDown={printMode?null:onMouseDown} style={{cursor:printMode?"default":"grab"}}>
        <rect x={bx-BW/2} y={by-BH/2} width={BW} height={BH} rx={6}
          fill={T.branchFill} stroke={T.branchStroke} strokeWidth={2}
          style={{filter:`drop-shadow(0 0 7px ${T.shadow}0.28))`}}/>
        {lines.map((l,i)=>(
          <EditText key={i} value={l} x={bx-BW/2} y={by-BH/2+i*(BH/lines.length)}
            w={printMode?BW:BW-18} h={BH/lines.length} fs={12} bold fill={T.textAccent} center
            onChange={v=>{const nl=[...lines];nl[i]=v;onUpdateBranchLabel(branch.id,nl.join("\n"));}}/>
        ))}
        {!printMode&&(
          <g style={{cursor:"pointer"}} onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();onToggleCollapse(branch.id);}}>
            <circle cx={bx+BW/2-11} cy={by} r={9} fill={T.accent}/>
            <text x={bx+BW/2-11} y={by+5} textAnchor="middle" fill={T.bg}
              fontSize={14} fontWeight="bold" style={{pointerEvents:"none",userSelect:"none"}}>
              {collapsed?"＋":"−"}
            </text>
          </g>
        )}
      </g>
      {!collapsed&&!printMode&&(()=>{
        const dir=side==="left"?-1:1,ax=bx+dir*(BW/2+22);
        return(
          <g style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onAddMember(branch.id,side);}}>
            <circle cx={ax} cy={by} r={11} fill={T.branchFill} stroke={T.accent} strokeWidth={1}/>
            <text x={ax} y={by+6} textAnchor="middle" fill={T.accent} fontSize={18} fontWeight="bold"
              style={{pointerEvents:"none",userSelect:"none"}}>+</text>
          </g>
        );
      })()}
    </g>
  );
}

function CentreCircle({c,onUpdate,T}){
  const words=c.text.split(" "),half=Math.ceil(words.length/2);
  const l1=words.slice(0,half).join(" "),l2=words.slice(half).join(" ");
  const cx=CX+c.dx,cy=CY+c.dy;
  return(
    <g>
      <circle cx={cx} cy={cy} r={CR} fill={T.circleFill} stroke={T.circleStroke} strokeWidth={2.2}
        style={{filter:`drop-shadow(0 0 14px ${T.shadow}0.18))`}}/>
      <EditText value={l1} x={cx-CR+8} y={l2?cy-18:cy-9} w={(CR-8)*2} h={18}
        fs={12} bold fill={T.textAccent} center onChange={v=>onUpdate(c.id,v+(l2?" "+l2:""))}/>
      {l2&&<EditText value={l2} x={cx-CR+8} y={cy+1} w={(CR-8)*2} h={18}
        fs={12} bold fill={T.textAccent} center onChange={v=>onUpdate(c.id,l1+" "+v)}/>}
    </g>
  );
}

function MindMap(){
  const [branches, setBranches] = useState(()=>__SAVED_STATE__?__SAVED_STATE__.branches:makeBranches());
  const [positions,setPositions] = useState(()=>__SAVED_STATE__?__SAVED_STATE__.positions:INIT_POSITIONS);
  const [center,   setCenter]   = useState(()=>__SAVED_STATE__?__SAVED_STATE__.center:INIT_CENTER);
  const [themeIdx, setThemeIdx] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.themeIdx||0):0);
  const [collapsed,setCollapsed] = useState({});
  const [zoom,     setZoom]     = useState(0.65);
  const [pan,      setPan]      = useState({x:0,y:0});
  const [exporting,setExporting] = useState(false);
  const [printMode,setPrintMode] = useState(false);
  const [showEmoji,setShowEmoji] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.showEmoji!==false):true);
  const [showPills,setShowPills] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.showPills!==false):true);
  const [skillLabel,setSkillLabel] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.skillLabel||"SKILL"):"SKILL");
  const [hobbyLabel,setHobbyLabel] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.hobbyLabel||"HOBBY"):"HOBBY");

  const T = THEMES[themeIdx] || THEMES[0];
  const svgRef  = useRef();
  const zoomRef = useRef(zoom);
  useEffect(()=>{zoomRef.current=zoom;},[zoom]);

  const panState=useRef({active:false});
  const onSvgDown=useCallback((e)=>{
    if(e.button!==0)return;
    panState.current={active:true,sx:e.clientX,sy:e.clientY,ox:pan.x,oy:pan.y};
  },[pan]);
  useEffect(()=>{
    const mv=(e)=>{
      if(!panState.current.active)return;
      setPan({x:panState.current.ox+e.clientX-panState.current.sx,
              y:panState.current.oy+e.clientY-panState.current.sy});
    };
    const up=()=>{panState.current.active=false;};
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
  },[]);

  useEffect(()=>{
    const el=svgRef.current;if(!el)return;
    const wh=(e)=>{e.preventDefault();setZoom(z=>Math.min(2.4,Math.max(0.22,z*(e.deltaY<0?1.06:0.94))));};
    el.addEventListener("wheel",wh,{passive:false});
    return()=>el.removeEventListener("wheel",wh);
  },[]);

  const commitBranch=useCallback((id,x,y)=>setPositions(p=>({...p,[id]:{x,y}})),[]);
  const commitMember=useCallback((bId,mId,ox,oy)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:b.members.map(m=>m.id!==mId?m:{...m,ox,oy})}));
  },[]);
  const commitSkill=useCallback((bId,mId,si,ox,oy)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,
      members:b.members.map(m=>m.id!==mId?m:{...m,
        skills:m.skills.map((s,i)=>i!==si?s:{...s,ox,oy})})}));
  },[]);
  const updateField=useCallback((bId,mId,field,value,si)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,
      members:b.members.map(m=>m.id!==mId?m:{...m,
        ...(field==="name"?{name:value}:{}),
        ...(field==="skill"?{skills:m.skills.map((s,i)=>i===si?{...s,label:value}:s)}:{}),
        ...(field==="icon" ?{skills:m.skills.map((s,i)=>i===si?{...s,icon:value}:s)} :{}),
      })}));
  },[]);
  const updateBranchLabel=useCallback((bId,label)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,label}));
  },[]);
  const updateCenter=useCallback((cId,text)=>{
    setCenter(cs=>cs.map(c=>c.id!==cId?c:{...c,text}));
  },[]);
  const addMember=useCallback((bId,side)=>{
    const dir=side==="left"?-1:1,baseOx=dir*((SW+MW)/2+14);
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:[...b.members,{
      id:"m_"+Date.now(),name:"New Member",
      ox:dir*200,oy:b.members.length*55-((b.members.length*55)/2),
      skills:[
        {icon:"pen",   label:"Specialisation",ox:baseOx,oy:-16},
        {icon:"tennis",label:"Hobby",          ox:baseOx,oy: 16},
      ]
    }]}));
  },[]);
  const removeMember=useCallback((bId,mId)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:b.members.filter(m=>m.id!==mId)}));
  },[]);
  const toggleCollapse=useCallback((id)=>setCollapsed(c=>({...c,[id]:!c[id]})),[]);

  const getContentBounds=useCallback(()=>{
    const innerG=svgRef.current&&svgRef.current.querySelector("g");
    if(innerG){try{const bb=innerG.getBBox(),pad=60;
      return{minX:bb.x-pad,minY:bb.y-pad,w:bb.width+pad*2,h:bb.height+pad*2};}catch(e){}}
    const pts=[],pad=320;
    Object.values(positions).forEach(({x,y})=>{pts.push({x:x-pad,y:y-pad},{x:x+pad,y:y+pad});});
    pts.push({x:CX-CR-100,y:CY-CR-100},{x:CX+CR+100,y:CY+CR+100});
    const minX=Math.min(...pts.map(p=>p.x))-80,minY=Math.min(...pts.map(p=>p.y))-80;
    const maxX=Math.max(...pts.map(p=>p.x))+80,maxY=Math.max(...pts.map(p=>p.y))+80;
    return{minX,minY,w:maxX-minX,h:maxY-minY};
  },[positions]);

  const buildExportClone=useCallback((w,h,minX,minY,scaleW,scaleH)=>{
    const clone=svgRef.current.cloneNode(true);
    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    clone.setAttribute("width",scaleW||w);clone.setAttribute("height",scaleH||h);
    clone.setAttribute("viewBox",`${minX} ${minY} ${w} ${h}`);
    clone.querySelector("g").setAttribute("transform","");
    clone.querySelectorAll("foreignObject").forEach(fo=>fo.remove());
    const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bg.setAttribute("x",minX);bg.setAttribute("y",minY);
    bg.setAttribute("width",w);bg.setAttribute("height",h);bg.setAttribute("fill",T.bg);
    clone.insertBefore(bg,clone.firstChild);
    const st=document.createElementNS("http://www.w3.org/2000/svg","style");
    st.textContent="text{font-family:'Caveat',Georgia,serif;}";
    clone.insertBefore(st,clone.firstChild);
    return clone;
  },[T.bg]);

  const exportSVG=useCallback(async()=>{
    setExporting(true);
    setPrintMode(true);
    await new Promise(r=>setTimeout(r,80));
    try{
      const{minX,minY,w,h}=getContentBounds();
      const svgStr=new XMLSerializer().serializeToString(buildExportClone(w,h,minX,minY));
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([svgStr],{type:"image/svg+xml"}));
      a.download="mindmap.svg";a.click();
    }finally{setExporting(false);setPrintMode(false);}
  },[getContentBounds,buildExportClone]);

  const exportPNG=useCallback(async()=>{
    setExporting(true);
    setPrintMode(true);
    await new Promise(r=>setTimeout(r,80));
    try{
      const{minX,minY,w,h}=getContentBounds();
      const SCALE=3,clone=buildExportClone(w,h,minX,minY,w*SCALE,h*SCALE);
      const svgUrl=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:"image/svg+xml;charset=utf-8"}));
      await new Promise((resolve,reject)=>{
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          canvas.width=w*SCALE;canvas.height=h*SCALE;
          const ctx=canvas.getContext("2d");
          ctx.fillStyle=T.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,0,0);URL.revokeObjectURL(svgUrl);
          canvas.toBlob(blob=>{
            const a=document.createElement("a");
            a.href=URL.createObjectURL(blob);a.download="mindmap-3x.png";a.click();resolve();
          },"image/png");
        };
        img.onerror=reject;img.src=svgUrl;
      });
    }finally{setExporting(false);setPrintMode(false);}
  },[getContentBounds,buildExportClone,T.bg]);

  const saveHTML=useCallback(()=>{
    try{
      const stateJson=JSON.stringify({branches,positions,center,themeIdx,showEmoji,showPills,skillLabel,hobbyLabel});
      // __STATIC_SOURCE__ = app code without the __SAVED_STATE__ line.
      // We prepend a fresh state line so chained saves always work from the same base.
      const staticSrc=window.__STATIC_SOURCE__;
      const appSource='const __SAVED_STATE__ = '+stateJson+'; // replaced by Save button\n'+staticSrc;
      const escapedStatic=JSON.stringify(staticSrc);
      const NL='\n';
      const html=[
        '<!DOCTYPE html>',
        '<html lang="en"><head>',
        '<meta charset="UTF-8"/>',
        '<meta name="viewport" content="width=device-width, initial-scale=1.0"/>',
        '<title>Team Mind Map</title>',
        '<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet"/>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><'+'/script>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><'+'/script>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"><'+'/script>',
        '<style>*{margin:0;padding:0;box-sizing:border-box;}body{width:100vw;height:100vh;overflow:hidden;background:#0d1b38;font-family:\'Caveat\',cursive;}<\/style>',
        '<\/head><body>',
        '<div id="root"><\/div>',
        '<'+'script id="app-source" type="text/x-app-source">'+NL+staticSrc+NL+'<'+'/script>',
        '<'+'script>window.__STATIC_SOURCE__=document.getElementById(\'app-source\').textContent;<'+'/script>',
        '<'+'script type="text/babel">'+NL+appSource+NL+'<'+'/script>',
        '<\/body><\/html>',
      ].join(NL);
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
      a.download='mindmap-saved.html';
      a.click();
    }catch(err){alert('Save failed: '+err.message);}
  },[branches,positions,center,themeIdx]);

  const W=window.innerWidth,H=window.innerHeight;
  const tx=pan.x+W/2-CX*zoom,ty=pan.y+H/2-CY*zoom;
  const btn={fontFamily:"'Caveat',cursive",fontSize:13,borderRadius:4,cursor:"pointer",
    padding:"3px 10px",border:"1px solid "+T.btnBorder,background:"transparent",color:T.textAccent};

  return(
    <div style={{width:"100vw",height:"100vh",background:T.bg,overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none",opacity:0.03,
        backgroundImage:"repeating-linear-gradient(0deg,#888 0,#888 1px,transparent 1px,transparent 44px),repeating-linear-gradient(90deg,#888 0,#888 1px,transparent 1px,transparent 44px)"}}/>

      {!printMode&&(
        <div style={{position:"absolute",bottom:16,left:16,zIndex:20,
          background:T.legend,border:"1px solid "+T.legendBorder,
          borderRadius:8,padding:"8px 14px",display:"flex",gap:16,alignItems:"center"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:2,background:T.pillSkill,border:"1px solid "+T.skillStroke}}/>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:13,color:T.textSkill}}>Skill / Field</span>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:2,background:T.pillHobby,border:"1px solid "+T.hobbyStroke}}/>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:13,color:T.textHobby}}>Hobby</span>
          </div>
          <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textMember,opacity:0.4}}>
            Click icon to change · Double-click text to edit
          </span>
          <div style={{width:1,height:20,background:T.btnBorder,margin:"0 4px"}}/>
          <label style={{display:"flex",gap:5,alignItems:"center",cursor:"pointer",
            fontFamily:"'Caveat',cursive",fontSize:13,color:T.textAccent}}>
            <input type="checkbox" checked={showEmoji} onChange={e=>setShowEmoji(e.target.checked)}
              style={{accentColor:T.accent,width:13,height:13,cursor:"pointer"}}/>
            Icons
          </label>
          <label style={{display:"flex",gap:5,alignItems:"center",cursor:"pointer",
            fontFamily:"'Caveat',cursive",fontSize:13,color:T.textAccent}}>
            <input type="checkbox" checked={showPills} onChange={e=>setShowPills(e.target.checked)}
              style={{accentColor:T.accent,width:13,height:13,cursor:"pointer"}}/>
            Labels
          </label>
          <div style={{width:1,height:20,background:T.btnBorder,margin:"0 4px"}}/>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textSkill,opacity:0.7}}>Skill:</span>
            <input value={skillLabel} onChange={e=>setSkillLabel(e.target.value.toUpperCase())}
              maxLength={10}
              style={{width:60,background:"transparent",border:"1px solid "+T.skillStroke,
                color:T.textSkill,fontFamily:"'Caveat',cursive",fontSize:12,borderRadius:4,
                padding:"1px 5px",outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textHobby,opacity:0.7}}>Hobby:</span>
            <input value={hobbyLabel} onChange={e=>setHobbyLabel(e.target.value.toUpperCase())}
              maxLength={10}
              style={{width:60,background:"transparent",border:"1px solid "+T.hobbyStroke,
                color:T.textHobby,fontFamily:"'Caveat',cursive",fontSize:12,borderRadius:4,
                padding:"1px 5px",outline:"none"}}/>
          </div>
        </div>
      )}

      {!printMode&&(
        <div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",zIndex:30,
          display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",
          background:T.toolbar,border:"1px solid "+T.toolbarBorder,
          borderRadius:8,padding:"6px 16px",backdropFilter:"blur(8px)"}}>
          <span style={{color:T.textAccent,fontSize:12,fontFamily:"'Caveat',cursive",opacity:0.6,marginRight:4}}>
            Drag any box · Scroll zoom · Double-click text to edit
          </span>
          {[0.5,0.75,1].map(z=>(
            <button key={z} onClick={()=>setZoom(z)}
              style={{...btn,background:Math.abs(zoom-z)<0.05?"rgba(128,128,128,0.2)":"transparent"}}>
              {z*100}%
            </button>
          ))}
          <button style={btn}
            onClick={()=>{setZoom(0.65);setPan({x:0,y:0});setPositions(INIT_POSITIONS);setBranches(makeBranches());setCenter(INIT_CENTER);}}>
            Reset
          </button>
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          {THEMES.map((th,i)=>(
            <button key={th.id} onClick={()=>setThemeIdx(i)} title={th.name}
              style={{background:th.bg,border:"2px solid "+(i===themeIdx?th.accent:"transparent"),
                borderRadius:20,width:22,height:22,cursor:"pointer",padding:0,
                boxShadow:i===themeIdx?"0 0 6px "+th.accent:"none",
                position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:th.accent,opacity:0.45,borderRadius:20}}/>
            </button>
          ))}
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          <button onClick={saveHTML}
            style={{...btn,background:"rgba(100,220,130,0.12)",border:"1px solid rgba(100,220,130,0.5)",
              color:"rgba(180,255,200,0.95)",fontWeight:"700"}}
            title="Download .html with all changes saved">
            💾 Save
          </button>
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          <button onClick={exportSVG} disabled={exporting}
            style={{...btn,background:"rgba(128,128,128,0.1)",border:"1px solid "+T.btnBorder,
              cursor:exporting?"wait":"pointer",opacity:exporting?0.5:1}}
            title="Vector — open in browser then Print to PDF">
            {exporting?"…":"↓"} SVG
          </button>
          <button onClick={exportPNG} disabled={exporting}
            style={{...btn,background:"rgba(128,128,128,0.08)",border:"1px solid "+T.btnBorder,
              cursor:exporting?"wait":"pointer",opacity:exporting?0.5:1}}
            title="High-res PNG at 3× scale">
            {exporting?"…":"↓"} PNG
          </button>
        </div>
      )}

      <svg ref={svgRef} width="100%" height="100%" onMouseDown={onSvgDown} style={{display:"block"}}>
        <g transform={`translate(${tx},${ty}) scale(${zoom})`}>
          {branches.map(branch=>(
            <BranchNode key={branch.id} branch={branch}
              initPos={positions[branch.id]||{x:CX,y:CY}}
              onCommitBranchMove={commitBranch} onCommitMemberMove={commitMember}
              onCommitSkillMove={commitSkill} onUpdate={updateField}
              onUpdateBranchLabel={updateBranchLabel} onAddMember={addMember}
              onRemoveMember={removeMember} collapsed={!!collapsed[branch.id]}
              onToggleCollapse={toggleCollapse} zoomRef={zoomRef} T={T} printMode={printMode}
              showEmoji={showEmoji} showPills={showPills} skillLabel={skillLabel} hobbyLabel={hobbyLabel}/>
          ))}
          {center.map(c=>(
            <CentreCircle key={c.id} c={c} onUpdate={updateCenter} T={T}/>
          ))}
        </g>
      </svg>
    </div>
  );
}

function rectEdge(cx,cy,w,h,tx,ty){
  const dx=tx-cx,dy=ty-cy;
  if(!dx&&!dy)return{x:cx,y:cy};
  const sx=(w/2)/Math.abs(dx||1e-9),sy=(h/2)/Math.abs(dy||1e-9),s=Math.min(sx,sy);
  return{x:cx+dx*s,y:cy+dy*s};
}
function circleEdge(cx,cy,r,tx,ty){
  const dx=tx-cx,dy=ty-cy,d=Math.hypot(dx,dy)||1;
  return{x:cx+(dx/d)*r,y:cy+(dy/d)*r};
}

function useDrag(initX,initY,onCommit,zoomRef){
  const live=useRef({x:initX,y:initY});
  const [,redraw]=useState(0);
  useEffect(()=>{live.current={x:initX,y:initY};},[initX,initY]);
  const onMouseDown=useCallback((e)=>{
    if(e.button!==0)return;
    e.stopPropagation();
    const s0={x:e.clientX,y:e.clientY},c0={...live.current};
    const onMove=(ev)=>{
      const z=zoomRef.current;
      live.current={x:c0.x+(ev.clientX-s0.x)/z,y:c0.y+(ev.clientY-s0.y)/z};
      redraw(n=>n+1);
    };
    const onUp=()=>{
      onCommit(live.current.x,live.current.y);
      window.removeEventListener("mousemove",onMove);
      window.removeEventListener("mouseup",onUp);
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  },[onCommit,zoomRef]);
  return{x:live.current.x,y:live.current.y,onMouseDown};
}

function EditText({value,onChange,x,y,w,h,fs=12,fill="#fff",bold=false,center=false}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(value);
  useEffect(()=>{setDraft(value);},[value]);
  const commit=()=>{setEditing(false);if(draft!==value)onChange(draft);};
  // Always centre: cx = x + w/2, cy = y + h/2
  const cx=x+w/2, cy=y+h/2;
  if(editing)return(
    <foreignObject x={x} y={cy-fs*0.9} width={w} height={fs*1.8} style={{overflow:"visible"}}>
      <input autoFocus value={draft}
        onChange={e=>setDraft(e.target.value)} onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setEditing(false);setDraft(value);}}}
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}
        style={{width:"100%",background:"rgba(10,22,50,0.95)",border:"1px solid #d4a843",
          color:"#fff",fontFamily:"'Caveat',cursive",fontSize:fs,fontWeight:bold?"700":"400",
          textAlign:"center",borderRadius:3,padding:"0 4px",outline:"none",boxSizing:"border-box",
          lineHeight:"1.6"}}/>
    </foreignObject>
  );
  return(
    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fill={fill}
      style={{fontFamily:"'Caveat',cursive",fontSize:fs,fontWeight:bold?"700":"400",cursor:"text",userSelect:"none"}}
      onDoubleClick={e=>{e.stopPropagation();setEditing(true);}}
      onMouseDown={e=>e.stopPropagation()}>
      {value}
    </text>
  );
}

function IconPicker({x,y,onPick,onClose}){

  const pw=cols*cellSize+8,ph=rows*cellSize+8;

      <rect x={-2000} y={-2000} width={9999} height={9999} fill="transparent" onClick={onClose}/>
      <rect x={x} y={y} width={pw} height={ph} rx={6} fill="rgba(10,22,50,0.97)" stroke="#d4a843" strokeWidth={1.5}/>
      {ICON_LIST.map((ic,i)=>{
        const col=i%cols,row=Math.floor(i/cols),ex=x+4+col*cellSize,ey=y+4+row*cellSize;
        return(
          <g key={ic.key} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onPick(ic.key);}}>
            <rect x={ex} y={ey} width={cellSize-2} height={cellSize-2} rx={3} fill="transparent"
              onMouseEnter={e=>e.currentTarget.setAttribute("fill","rgba(212,168,67,0.2)")}
              onMouseLeave={e=>e.currentTarget.setAttribute("fill","transparent")}/>

const CIRCLE_CENTRES=[{cx:CX-72,cy:CY-52},{cx:CX+72,cy:CY-52},{cx:CX,cy:CY+62}];

function BranchNode({branch,initPos,onCommitBranchMove,onCommitMemberMove,onCommitSkillMove,
                     onUpdate,onUpdateBranchLabel,onAddMember,onRemoveMember,
                     collapsed,onToggleCollapse,zoomRef,T,printMode,showEmoji,showPills,skillLabel,hobbyLabel}){
  const commit=useCallback((nx,ny)=>onCommitBranchMove(branch.id,nx,ny),[branch.id,onCommitBranchMove]);
  const {x:bx,y:by,onMouseDown}=useDrag(initPos.x,initPos.y,commit,zoomRef);
  const closest=CIRCLE_CENTRES.reduce((best,c)=>{
    const d=Math.hypot(bx-c.cx,by-c.cy);
    return d<best.d?{...c,d}:best;
  },{...CIRCLE_CENTRES[0],d:Infinity});
  const p1=circleEdge(closest.cx,closest.cy,CR,bx,by);
  const p2=rectEdge(bx,by,BW,BH,closest.cx,closest.cy);
  const side=bx<CX?"left":"right";
  const lines=branch.label.split("\n");
  return(
    <g>
      <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
        stroke={T.lineMain} strokeWidth={2.6} strokeLinecap="round"

        {lines.map((l,i)=>(
          <EditText key={i} value={l} x={bx-BW/2} y={by-BH/2+i*(BH/lines.length)}
            w={printMode?BW:BW-18} h={BH/lines.length} fs={12} bold fill={T.textAccent} center
            onChange={v=>{const nl=[...lines];nl[i]=v;onUpdateBranchLabel(branch.id,nl.join("\n"));}}/>
        ))}
        {!printMode&&(
          <g style={{cursor:"pointer"}} onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();onToggleCollapse(branch.id);}}>
            <circle cx={bx+BW/2-11} cy={by} r={9} fill={T.accent}/>
            <text x={bx+BW/2-11} y={by+5} textAnchor="middle" fill={T.bg}
              fontSize={14} fontWeight="bold" style={{pointerEvents:"none",userSelect:"none"}}>
              {collapsed?"＋":"−"}
            </text>
          </g>
        )}
      </g>
      {!collapsed&&!printMode&&(()=>{
        const dir=side==="left"?-1:1,ax=bx+dir*(BW/2+22);
        return(
          <g style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onAddMember(branch.id,side);}}>
            <circle cx={ax} cy={by} r={11} fill={T.branchFill} stroke={T.accent} strokeWidth={1}/>
            <text x={ax} y={by+6} textAnchor="middle" fill={T.accent} fontSize={18} fontWeight="bold"
              style={{pointerEvents:"none",userSelect:"none"}}>+</text>
          </g>
        );
      })()}
    </g>
  );
}

function CentreCircle({c,onUpdate,T}){
  const words=c.text.split(" "),half=Math.ceil(words.length/2);
  const l1=words.slice(0,half).join(" "),l2=words.slice(half).join(" ");
  const cx=CX+c.dx,cy=CY+c.dy;
  return(
    <g>
      <circle cx={cx} cy={cy} r={CR} fill={T.circleFill} stroke={T.circleStroke} strokeWidth={2.2}
        style={{filter:`drop-shadow(0 0 14px ${T.shadow}0.18))`}}/>
      <EditText value={l1} x={cx-CR+8} y={l2?cy-18:cy-9} w={(CR-8)*2} h={18}
        fs={12} bold fill={T.textAccent} center onChange={v=>onUpdate(c.id,v+(l2?" "+l2:""))}/>
      {l2&&<EditText value={l2} x={cx-CR+8} y={cy+1} w={(CR-8)*2} h={18}
        fs={12} bold fill={T.textAccent} center onChange={v=>onUpdate(c.id,l1+" "+v)}/>}
    </g>
  );
}

function MindMap(){
  const [branches, setBranches] = useState(()=>__SAVED_STATE__?__SAVED_STATE__.branches:makeBranches());
  const [positions,setPositions] = useState(()=>__SAVED_STATE__?__SAVED_STATE__.positions:INIT_POSITIONS);
  const [center,   setCenter]   = useState(()=>__SAVED_STATE__?__SAVED_STATE__.center:INIT_CENTER);
  const [themeIdx, setThemeIdx] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.themeIdx||0):0);
  const [collapsed,setCollapsed] = useState({});
  const [zoom,     setZoom]     = useState(0.65);
  const [pan,      setPan]      = useState({x:0,y:0});
  const [exporting,setExporting] = useState(false);
  const [printMode,setPrintMode] = useState(false);
  const [showEmoji,setShowEmoji] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.showEmoji!==false):true);
  const [showPills,setShowPills] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.showPills!==false):true);
  const [skillLabel,setSkillLabel] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.skillLabel||"SKILL"):"SKILL");
  const [hobbyLabel,setHobbyLabel] = useState(()=>__SAVED_STATE__?(__SAVED_STATE__.hobbyLabel||"HOBBY"):"HOBBY");

  const T = THEMES[themeIdx] || THEMES[0];
  const svgRef  = useRef();
  const zoomRef = useRef(zoom);
  useEffect(()=>{zoomRef.current=zoom;},[zoom]);

  const panState=useRef({active:false});
  const onSvgDown=useCallback((e)=>{
    if(e.button!==0)return;
    panState.current={active:true,sx:e.clientX,sy:e.clientY,ox:pan.x,oy:pan.y};
  },[pan]);
  useEffect(()=>{
    const mv=(e)=>{
      if(!panState.current.active)return;
      setPan({x:panState.current.ox+e.clientX-panState.current.sx,
              y:panState.current.oy+e.clientY-panState.current.sy});
    };
    const up=()=>{panState.current.active=false;};
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
  },[]);

  useEffect(()=>{
    const el=svgRef.current;if(!el)return;
    const wh=(e)=>{e.preventDefault();setZoom(z=>Math.min(2.4,Math.max(0.22,z*(e.deltaY<0?1.06:0.94))));};
    el.addEventListener("wheel",wh,{passive:false});
    return()=>el.removeEventListener("wheel",wh);
  },[]);

  const commitBranch=useCallback((id,x,y)=>setPositions(p=>({...p,[id]:{x,y}})),[]);
  const commitMember=useCallback((bId,mId,ox,oy)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:b.members.map(m=>m.id!==mId?m:{...m,ox,oy})}));
  },[]);
  const commitSkill=useCallback((bId,mId,si,ox,oy)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,
      members:b.members.map(m=>m.id!==mId?m:{...m,
        skills:m.skills.map((s,i)=>i!==si?s:{...s,ox,oy})})}));
  },[]);
  const updateField=useCallback((bId,mId,field,value,si)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,
      members:b.members.map(m=>m.id!==mId?m:{...m,
        ...(field==="name"?{name:value}:{}),
        ...(field==="skill"?{skills:m.skills.map((s,i)=>i===si?{...s,label:value}:s)}:{}),
        ...(field==="icon" ?{skills:m.skills.map((s,i)=>i===si?{...s,icon:value}:s)} :{}),
      })}));
  },[]);
  const updateBranchLabel=useCallback((bId,label)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,label}));
  },[]);
  const updateCenter=useCallback((cId,text)=>{
    setCenter(cs=>cs.map(c=>c.id!==cId?c:{...c,text}));
  },[]);
  const addMember=useCallback((bId,side)=>{
    const dir=side==="left"?-1:1,baseOx=dir*((SW+MW)/2+14);
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:[...b.members,{
      id:"m_"+Date.now(),name:"New Member",
      ox:dir*200,oy:b.members.length*55-((b.members.length*55)/2),
      skills:[
        {icon:"pen",   label:"Specialisation",ox:baseOx,oy:-16},
        {icon:"tennis",label:"Hobby",          ox:baseOx,oy: 16},
      ]
    }]}));
  },[]);
  const removeMember=useCallback((bId,mId)=>{
    setBranches(bs=>bs.map(b=>b.id!==bId?b:{...b,members:b.members.filter(m=>m.id!==mId)}));
  },[]);
  const toggleCollapse=useCallback((id)=>setCollapsed(c=>({...c,[id]:!c[id]})),[]);

  const getContentBounds=useCallback(()=>{
    const innerG=svgRef.current&&svgRef.current.querySelector("g");
    if(innerG){try{const bb=innerG.getBBox(),pad=60;
      return{minX:bb.x-pad,minY:bb.y-pad,w:bb.width+pad*2,h:bb.height+pad*2};}catch(e){}}
    const pts=[],pad=320;
    Object.values(positions).forEach(({x,y})=>{pts.push({x:x-pad,y:y-pad},{x:x+pad,y:y+pad});});
    pts.push({x:CX-CR-100,y:CY-CR-100},{x:CX+CR+100,y:CY+CR+100});
    const minX=Math.min(...pts.map(p=>p.x))-80,minY=Math.min(...pts.map(p=>p.y))-80;
    const maxX=Math.max(...pts.map(p=>p.x))+80,maxY=Math.max(...pts.map(p=>p.y))+80;
    return{minX,minY,w:maxX-minX,h:maxY-minY};
  },[positions]);

  const buildExportClone=useCallback((w,h,minX,minY,scaleW,scaleH)=>{
    const clone=svgRef.current.cloneNode(true);
    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    clone.setAttribute("width",scaleW||w);clone.setAttribute("height",scaleH||h);
    clone.setAttribute("viewBox",`${minX} ${minY} ${w} ${h}`);
    clone.querySelector("g").setAttribute("transform","");
    clone.querySelectorAll("foreignObject").forEach(fo=>fo.remove());
    const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bg.setAttribute("x",minX);bg.setAttribute("y",minY);
    bg.setAttribute("width",w);bg.setAttribute("height",h);bg.setAttribute("fill",T.bg);
    clone.insertBefore(bg,clone.firstChild);
    const st=document.createElementNS("http://www.w3.org/2000/svg","style");
    st.textContent="text{font-family:'Caveat',Georgia,serif;}";
    clone.insertBefore(st,clone.firstChild);
    return clone;
  },[T.bg]);

  const exportSVG=useCallback(async()=>{
    setExporting(true);
    setPrintMode(true);
    await new Promise(r=>setTimeout(r,80));
    try{
      const{minX,minY,w,h}=getContentBounds();
      const svgStr=new XMLSerializer().serializeToString(buildExportClone(w,h,minX,minY));
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([svgStr],{type:"image/svg+xml"}));
      a.download="mindmap.svg";a.click();
    }finally{setExporting(false);setPrintMode(false);}
  },[getContentBounds,buildExportClone]);

  const exportPNG=useCallback(async()=>{
    setExporting(true);
    setPrintMode(true);
    await new Promise(r=>setTimeout(r,80));
    try{
      const{minX,minY,w,h}=getContentBounds();
      const SCALE=3,clone=buildExportClone(w,h,minX,minY,w*SCALE,h*SCALE);
      const svgUrl=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:"image/svg+xml;charset=utf-8"}));
      await new Promise((resolve,reject)=>{
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          canvas.width=w*SCALE;canvas.height=h*SCALE;
          const ctx=canvas.getContext("2d");
          ctx.fillStyle=T.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,0,0);URL.revokeObjectURL(svgUrl);
          canvas.toBlob(blob=>{
            const a=document.createElement("a");
            a.href=URL.createObjectURL(blob);a.download="mindmap-3x.png";a.click();resolve();
          },"image/png");
        };
        img.onerror=reject;img.src=svgUrl;
      });
    }finally{setExporting(false);setPrintMode(false);}
  },[getContentBounds,buildExportClone,T.bg]);

  const saveHTML=useCallback(()=>{
    try{
      const stateJson=JSON.stringify({branches,positions,center,themeIdx,showEmoji,showPills,skillLabel,hobbyLabel});
      // __STATIC_SOURCE__ = app code without the __SAVED_STATE__ line.
      // We prepend a fresh state line so chained saves always work from the same base.
      const staticSrc=window.__STATIC_SOURCE__;
      const appSource='const __SAVED_STATE__ = '+stateJson+'; // replaced by Save button\n'+staticSrc;
      const escapedStatic=JSON.stringify(staticSrc);
      const NL='\n';
      const html=[
        '<!DOCTYPE html>',
        '<html lang="en"><head>',
        '<meta charset="UTF-8"/>',
        '<meta name="viewport" content="width=device-width, initial-scale=1.0"/>',
        '<title>Team Mind Map</title>',
        '<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet"/>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><'+'/script>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><'+'/script>',
        '<'+'script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"><'+'/script>',
        '<style>*{margin:0;padding:0;box-sizing:border-box;}body{width:100vw;height:100vh;overflow:hidden;background:#0d1b38;font-family:\'Caveat\',cursive;}<\/style>',
        '<\/head><body>',
        '<div id="root"><\/div>',
        '<'+'script id="app-source" type="text/x-app-source">'+NL+staticSrc+NL+'<'+'/script>',
        '<'+'script>window.__STATIC_SOURCE__=document.getElementById(\'app-source\').textContent;<'+'/script>',
        '<'+'script type="text/babel">'+NL+appSource+NL+'<'+'/script>',
        '<\/body><\/html>',
      ].join(NL);
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
      a.download='mindmap-saved.html';
      a.click();
    }catch(err){alert('Save failed: '+err.message);}
  },[branches,positions,center,themeIdx]);

  const W=window.innerWidth,H=window.innerHeight;
  const tx=pan.x+W/2-CX*zoom,ty=pan.y+H/2-CY*zoom;
  const btn={fontFamily:"'Caveat',cursive",fontSize:13,borderRadius:4,cursor:"pointer",
    padding:"3px 10px",border:"1px solid "+T.btnBorder,background:"transparent",color:T.textAccent};

  return(
    <div style={{width:"100vw",height:"100vh",background:T.bg,overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none",opacity:0.03,
        backgroundImage:"repeating-linear-gradient(0deg,#888 0,#888 1px,transparent 1px,transparent 44px),repeating-linear-gradient(90deg,#888 0,#888 1px,transparent 1px,transparent 44px)"}}/>

      {!printMode&&(
        <div style={{position:"absolute",bottom:16,left:16,zIndex:20,
          background:T.legend,border:"1px solid "+T.legendBorder,
          borderRadius:8,padding:"8px 14px",display:"flex",gap:16,alignItems:"center"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:2,background:T.pillSkill,border:"1px solid "+T.skillStroke}}/>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:13,color:T.textSkill}}>Skill / Field</span>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:2,background:T.pillHobby,border:"1px solid "+T.hobbyStroke}}/>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:13,color:T.textHobby}}>Hobby</span>
          </div>
          <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textMember,opacity:0.4}}>
            Click icon to change · Double-click text to edit
          </span>
          <div style={{width:1,height:20,background:T.btnBorder,margin:"0 4px"}}/>
          <label style={{display:"flex",gap:5,alignItems:"center",cursor:"pointer",
            fontFamily:"'Caveat',cursive",fontSize:13,color:T.textAccent}}>
            <input type="checkbox" checked={showEmoji} onChange={e=>setShowEmoji(e.target.checked)}
              style={{accentColor:T.accent,width:13,height:13,cursor:"pointer"}}/>
            Icons
          </label>
          <label style={{display:"flex",gap:5,alignItems:"center",cursor:"pointer",
            fontFamily:"'Caveat',cursive",fontSize:13,color:T.textAccent}}>
            <input type="checkbox" checked={showPills} onChange={e=>setShowPills(e.target.checked)}
              style={{accentColor:T.accent,width:13,height:13,cursor:"pointer"}}/>
            Labels
          </label>
          <div style={{width:1,height:20,background:T.btnBorder,margin:"0 4px"}}/>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textSkill,opacity:0.7}}>Skill:</span>
            <input value={skillLabel} onChange={e=>setSkillLabel(e.target.value.toUpperCase())}
              maxLength={10}
              style={{width:60,background:"transparent",border:"1px solid "+T.skillStroke,
                color:T.textSkill,fontFamily:"'Caveat',cursive",fontSize:12,borderRadius:4,
                padding:"1px 5px",outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{fontFamily:"'Caveat',cursive",fontSize:12,color:T.textHobby,opacity:0.7}}>Hobby:</span>
            <input value={hobbyLabel} onChange={e=>setHobbyLabel(e.target.value.toUpperCase())}
              maxLength={10}
              style={{width:60,background:"transparent",border:"1px solid "+T.hobbyStroke,
                color:T.textHobby,fontFamily:"'Caveat',cursive",fontSize:12,borderRadius:4,
                padding:"1px 5px",outline:"none"}}/>
          </div>
        </div>
      )}

      {!printMode&&(
        <div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",zIndex:30,
          display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",
          background:T.toolbar,border:"1px solid "+T.toolbarBorder,
          borderRadius:8,padding:"6px 16px",backdropFilter:"blur(8px)"}}>
          <span style={{color:T.textAccent,fontSize:12,fontFamily:"'Caveat',cursive",opacity:0.6,marginRight:4}}>
            Drag any box · Scroll zoom · Double-click text to edit
          </span>
          {[0.5,0.75,1].map(z=>(
            <button key={z} onClick={()=>setZoom(z)}
              style={{...btn,background:Math.abs(zoom-z)<0.05?"rgba(128,128,128,0.2)":"transparent"}}>
              {z*100}%
            </button>
          ))}
          <button style={btn}
            onClick={()=>{setZoom(0.65);setPan({x:0,y:0});setPositions(INIT_POSITIONS);setBranches(makeBranches());setCenter(INIT_CENTER);}}>
            Reset
          </button>
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          {THEMES.map((th,i)=>(
            <button key={th.id} onClick={()=>setThemeIdx(i)} title={th.name}
              style={{background:th.bg,border:"2px solid "+(i===themeIdx?th.accent:"transparent"),
                borderRadius:20,width:22,height:22,cursor:"pointer",padding:0,
                boxShadow:i===themeIdx?"0 0 6px "+th.accent:"none",
                position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:th.accent,opacity:0.45,borderRadius:20}}/>
            </button>
          ))}
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          <button onClick={saveHTML}
            style={{...btn,background:"rgba(100,220,130,0.12)",border:"1px solid rgba(100,220,130,0.5)",
              color:"rgba(180,255,200,0.95)",fontWeight:"700"}}
            title="Download .html with all changes saved">
            💾 Save
          </button>
          <div style={{width:1,height:22,background:T.btnBorder}}/>
          <button onClick={exportSVG} disabled={exporting}
            style={{...btn,background:"rgba(128,128,128,0.1)",border:"1px solid "+T.btnBorder,
              cursor:exporting?"wait":"pointer",opacity:exporting?0.5:1}}
            title="Vector — open in browser then Print to PDF">
            {exporting?"…":"↓"} SVG
          </button>
          <button onClick={exportPNG} disabled={exporting}
            style={{...btn,background:"rgba(128,128,128,0.08)",border:"1px solid "+T.btnBorder,
              cursor:exporting?"wait":"pointer",opacity:exporting?0.5:1}}
            title="High-res PNG at 3× scale">
            {exporting?"…":"↓"} PNG
          </button>
        </div>
      )}

      <svg ref={svgRef} width="100%" height="100%" onMouseDown={onSvgDown} style={{display:"block"}}>
        <g transform={`translate(${tx},${ty}) scale(${zoom})`}>
          {branches.map(branch=>(
            <BranchNode key={branch.id} branch={branch}
              initPos={positions[branch.id]||{x:CX,y:CY}}
              onCommitBranchMove={commitBranch} onCommitMemberMove={commitMember}
              onCommitSkillMove={commitSkill} onUpdate={updateField}
              onUpdateBranchLabel={updateBranchLabel} onAddMember={addMember}
              onRemoveMember={removeMember} collapsed={!!collapsed[branch.id]}
              onToggleCollapse={toggleCollapse} zoomRef={zoomRef} T={T} printMode={printMode}
              showEmoji={showEmoji} showPills={showPills} skillLabel={skillLabel} hobbyLabel={hobbyLabel}/>
          ))}
          {center.map(c=>(
            <CentreCircle key={c.id} c={c} onUpdate={updateCenter} T={T}/>
          ))}
        </g>
      </svg>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MindMap/>);
</script>
</body>
</html>
